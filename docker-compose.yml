version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://agente-backend.amxxqr.easypanel.host/api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

